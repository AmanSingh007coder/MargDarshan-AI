<svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="networkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#0284c7;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <rect width="300" height="100" fill="#020617" opacity="0"/>

  <!-- Network lines (background) -->
  <g opacity="0.4" stroke="url(#networkGrad)" stroke-width="1" fill="none" filter="url(#glow)">
    <!-- Upper curved line -->
    <path d="M 30 35 Q 80 20, 120 30 T 200 25" stroke="#06b6d4"/>
    <!-- Lower curved line -->
    <path d="M 40 65 Q 90 75, 130 70 T 210 75" stroke="#0284c7"/>
    <!-- Connecting dots for network -->
    <circle cx="50" cy="45" r="1.5" fill="#06b6d4" opacity="0.6"/>
    <circle cx="95" cy="35" r="1.5" fill="#06b6d4" opacity="0.6"/>
    <circle cx="140" cy="50" r="1.5" fill="#0284c7" opacity="0.6"/>
    <circle cx="185" cy="40" r="1.5" fill="#06b6d4" opacity="0.6"/>
    <circle cx="220" cy="55" r="1.5" fill="#06b6d4" opacity="0.6"/>
  </g>

  <!-- Location pins with glow -->
  <g filter="url(#glow)">
    <!-- Pin 1 (top) -->
    <circle cx="65" cy="32" r="5" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
    <circle cx="65" cy="32" r="2.5" fill="#06b6d4"/>

    <!-- Pin 2 (bottom) -->
    <circle cx="155" cy="68" r="5" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
    <circle cx="155" cy="68" r="2.5" fill="#06b6d4"/>
  </g>

  <!-- Main text: "Marg दर्शन" -->
  <g filter="url(#textGlow)">
    <!-- "Marg" in English -->
    <text x="50" y="62" font-family="'Manrope', 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="1">
      Marg
    </text>

    <!-- "दर्शन" in Devanagari -->
    <text x="160" y="62" font-family="'Segoe UI', 'Noto Sans Devanagari', sans-serif" font-size="32" font-weight="700" fill="#06b6d4" letter-spacing="0.5">
      दर्शन
    </text>
  </g>

  <!-- Accent dot/separator -->
  <circle cx="152" cy="48" r="2" fill="#f97316" opacity="0.8" filter="url(#glow)"/>

  <!-- Subtle animated line accent (static in SVG, but styled for visual interest) -->
  <line x1="30" y1="48" x2="45" y2="48" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <line x1="255" y1="48" x2="270" y2="48" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
</svg>
